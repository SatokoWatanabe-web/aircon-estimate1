<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>エアコン概算見積もり Ver.3</title>
  <style>
    :root{
      --navy:#102a4c;
      --navy-2:#173c6a;
      --blue:#2563eb;
      --bg:#eef3f8;
      --card:#ffffff;
      --line:#d6dee8;
      --text:#172033;
      --muted:#667085;
      --danger:#b42318;
      --shadow:0 8px 24px rgba(15, 42, 76, .12);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:var(--navy);
      color:var(--text);
    }
    button,input{font:inherit}
    button{cursor:pointer}
    .app{min-height:100vh;padding:14px}
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }
    h1{margin:0;color:#fff;font-size:22px}
    .subtitle{margin:4px 0 0;color:#dce8f6;font-size:13px}
    .top-actions{display:flex;gap:8px;flex-wrap:wrap}
    .top-actions button,.save-name{
      border:1px solid var(--line);
      border-radius:10px;
      padding:9px 12px;
      background:#fff;
    }
    .top-actions .primary{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:800}
    .top-actions .danger{color:var(--danger);font-weight:800}
    .save-name{min-width:180px}

    .plans{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:10px;
    }
    .plan{
      background:var(--card);
      border-radius:16px;
      padding:12px;
      box-shadow:var(--shadow);
      min-width:0;
    }
    .plan-title{
      width:100%;
      border:1px solid var(--line);
      border-radius:10px;
      padding:10px;
      text-align:center;
      font-size:18px;
      font-weight:900;
      margin-bottom:8px;
    }
    .plan-total{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      background:var(--navy-2);
      color:#fff;
      border-radius:10px;
      padding:10px 12px;
      font-weight:900;
      margin-bottom:10px;
    }
    .plan-total strong{font-size:23px}

    .unit{
      background:var(--bg);
      border:1px solid var(--line);
      border-radius:13px;
      padding:9px;
      margin-bottom:10px;
    }
    .unit-title{
      width:100%;
      border:1px solid var(--line);
      border-radius:9px;
      padding:8px;
      background:#fff;
      font-weight:900;
      margin-bottom:8px;
    }
    .quick{
      background:#fff;
      border:1px solid #c4d1df;
      border-radius:11px;
      padding:9px;
      margin-bottom:8px;
    }
    .label{
      font-size:12px;
      color:var(--muted);
      font-weight:900;
      margin-bottom:5px;
    }
    .choice-row,.capacity-row{
      display:flex;
      gap:5px;
      flex-wrap:wrap;
      margin-bottom:9px;
    }
    .choice-btn,.capacity-btn{
      border:1px solid #9db0c6;
      background:#fff;
      color:var(--navy);
      border-radius:999px;
      padding:6px 11px;
      font-size:12px;
      font-weight:900;
    }
    .choice-btn.selected,.capacity-btn.selected{
      background:var(--navy);
      color:#fff;
      border-color:var(--navy);
    }
    .price-row{
      display:grid;
      grid-template-columns:minmax(95px,1fr) minmax(100px,1fr);
      gap:8px;
      align-items:center;
    }
    .price-row span{font-weight:900}
    .price-row input{
      width:100%;
      border:2px solid #9db0c6;
      border-radius:9px;
      padding:9px;
      text-align:right;
      font-weight:900;
    }
    .summary-chip{
      background:#e9f1fb;
      color:var(--navy);
      border-radius:9px;
      padding:7px 9px;
      font-weight:900;
      font-size:13px;
      margin-bottom:8px;
    }

    .header-row,.item-row{
      display:grid;
      grid-template-columns:54px minmax(95px,1.35fr) minmax(78px,.9fr) 34px;
      gap:5px;
      align-items:center;
    }
    .header-row{
      color:var(--muted);
      font-size:11px;
      font-weight:800;
      padding:0 2px 5px;
    }
    .item-row{margin-bottom:5px}
    .item-row input{
      width:100%;
      min-width:0;
      border:1px solid var(--line);
      border-radius:8px;
      padding:8px 6px;
      background:#fff;
    }
    .item-row input[type="number"]{text-align:right}
    .toggle{
      border:1px solid var(--line);
      border-radius:8px;
      background:#fff;
      height:36px;
      padding:0 4px;
      font-size:10px;
      font-weight:900;
    }
    .toggle.off{background:#e9edf2;color:var(--muted)}
    .disabled-row input{background:#e9edf2;opacity:.55}
    .remove{
      border:1px solid var(--line);
      border-radius:8px;
      background:#fff;
      color:var(--danger);
      width:34px;
      height:34px;
      font-weight:900;
    }
    .subtotal{
      display:flex;
      justify-content:space-between;
      border-top:1px solid var(--line);
      padding-top:8px;
      margin-top:7px;
      font-weight:900;
    }
    .subtotal strong{font-size:18px}
    .unit-actions{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin-top:7px;
    }
    .unit-actions button,.add-unit{
      border:1px solid var(--line);
      border-radius:9px;
      background:#fff;
      padding:8px;
      font-size:12px;
      font-weight:900;
    }
    .unit-actions button{flex:1}
    .unit-actions .danger{color:var(--danger)}
    .add-unit{
      width:100%;
      color:var(--navy);
      background:#edf4fb;
      border-color:#b7c8dc;
      margin-top:2px;
    }

    .saved{
      margin-top:14px;
      background:#fff;
      border-radius:13px;
      padding:11px;
    }
    .saved h2{font-size:16px;margin:0 0 8px}
    .saved-entry{
      display:flex;
      gap:8px;
      align-items:center;
      border-top:1px solid #eceff3;
      padding:8px 0;
    }
    .saved-entry:first-child{border-top:none}
    .saved-entry span{flex:1}
    .saved-entry button{
      border:1px solid var(--line);
      background:#fff;
      border-radius:8px;
      padding:7px 10px;
      font-weight:800;
    }
    .status{color:#fff;min-height:22px;margin-top:8px;font-size:13px}

    body.presentation .edit-only,
    body.presentation .quick,
    body.presentation .unit-actions,
    body.presentation .add-unit,
    body.presentation .saved,
    body.presentation .remove,
    body.presentation .subtitle{
      display:none!important;
    }
    body.presentation{background:#fff}
    body.presentation .app{padding:6px}
    body.presentation .plan{box-shadow:none;border:1px solid var(--line)}
    body.presentation .disabled-row{display:none}
    body.presentation .header-row,
    body.presentation .item-row{
      grid-template-columns:minmax(110px,1.4fr) minmax(80px,.8fr);
    }
    body.presentation input{
      border-color:transparent;
      background:transparent;
      padding-left:2px;
      padding-right:2px;
    }

    /* 縦画面：1プランずつ表示し、左右スワイプで切り替え */
    @media (max-width:980px) and (orientation:portrait){
      .plans{
        display:flex;
        overflow-x:auto;
        gap:10px;
        scroll-snap-type:x mandatory;
        scroll-behavior:smooth;
        overscroll-behavior-x:contain;
        -webkit-overflow-scrolling:touch;
        scrollbar-width:none;
        touch-action:pan-x pan-y;
      }
      .plans::-webkit-scrollbar{display:none}
      .plan{
        flex:0 0 100%;
        width:100%;
        scroll-snap-align:start;
        scroll-snap-stop:always;
      }
    }
    @media print{
      body{background:#fff}
      .topbar,.saved,.status,.edit-only,.quick,.unit-actions,.add-unit,.remove{display:none!important}
      .app{padding:0}
      .plans{grid-template-columns:repeat(3,minmax(0,1fr));gap:6px}
      .plan{box-shadow:none;border:1px solid var(--line)}
      .disabled-row{display:none}
      .header-row,.item-row{grid-template-columns:minmax(110px,1.4fr) minmax(80px,.8fr)}
    }
  </style>
</head>
<body>
<main class="app">
  <header class="topbar">
    <div>
      <h1>エアコン概算見積もり Ver.3</h1>
      <p class="subtitle">「新規／買替え」「畳数」「本体価格」の3入力で概算を作成</p>
    </div>
    <div class="top-actions edit-only">
      <input id="saveName" class="save-name" placeholder="保存名（例：田中様）">
      <button id="saveBtn" class="primary">保存</button>
      <button id="presentationBtn">プレゼン表示</button>
      <button id="printBtn">印刷 / PDF</button>
      <button id="resetBtn" class="danger">全消去</button>
    </div>
  </header>

  <section id="plans" class="plans"></section>
  <div id="status" class="status"></div>

  <section class="saved edit-only">
    <h2>保存した見積もり</h2>
    <div id="savedList"></div>
  </section>
</main>

<script>
const STORAGE_KEY = "aircon-estimate-v3";
const CAPACITIES = ["2.2","2.5","2.8","3.6","4.0","5.6","6.3"];
const TATAMI = {
  "2.2":"6畳用","2.5":"8畳用","2.8":"10畳用",
  "3.6":"12畳用","4.0":"14畳用","5.6":"18畳用","6.3":"20畳用"
};
const INSTALLATION = {
  "2.2":20350,"2.5":20350,"2.8":20350,"3.6":20350,
  "4.0":24750,"5.6":24750,"6.3":28050
};
const BASE_ROWS = ["本体","工事費用","保証","取り外し費用","リサイクル","値引","複数台値引"];
const MAX_UNITS = 10;

function blankUnit(index){
  const type = "new";
  return {
    title: `${index}台目`,
    type,
    capacity: "",
    rows: BASE_ROWS.map(name => ({
      name,
      amount: "",
      enabled: !["取り外し費用","リサイクル"].includes(name)
    }))
  };
}
function blankPlan(name){
  return { title:name, units:[blankUnit(1)] };
}
let state = {
  plans:[blankPlan("プランA"),blankPlan("プランB"),blankPlan("プランC")]
};

function esc(v){
  return String(v ?? "")
    .replaceAll("&","&amp;").replaceAll("<","&lt;")
    .replaceAll(">","&gt;").replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
function yen(v){
  return new Intl.NumberFormat("ja-JP").format(Number(v) || 0) + "円";
}
function row(unit,name){ return unit.rows.find(r => r.name === name); }
function unitTotal(unit){
  return unit.rows.reduce((sum,r) => sum + (r.enabled === false ? 0 : (Number(r.amount) || 0)), 0);
}
function planTotal(plan){
  return plan.units.reduce((sum,u) => sum + unitTotal(u), 0);
}
function showStatus(text){
  const el = document.getElementById("status");
  el.textContent = text;
  clearTimeout(showStatus.timer);
  showStatus.timer = setTimeout(() => el.textContent = "", 3000);
}
function saveAuto(){
  const store = getStore();
  store.autosave = JSON.parse(JSON.stringify(state));
  setStore(store);
}
function getStore(){
  try{
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {autosave:null,saves:[]};
  }catch{
    return {autosave:null,saves:[]};
  }
}
function setStore(data){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function applyType(unit,type){
  unit.type = type;
  const removal = row(unit,"取り外し費用");
  const recycle = row(unit,"リサイクル");

  if(type === "replacement"){
    removal.enabled = true;
    recycle.enabled = true;
    if(!String(removal.amount || "").trim()) removal.amount = "6600";
    if(!String(recycle.amount || "").trim()) recycle.amount = "4070";
  }else{
    removal.enabled = false;
    recycle.enabled = false;
  }
}
function applyCapacity(unit,capacity){
  unit.capacity = capacity;
  const construction = row(unit,"工事費用");
  construction.enabled = true;
  construction.amount = String(INSTALLATION[capacity]);
}

function render(){
  const plansEl = document.getElementById("plans");
  const previousWidth = plansEl.clientWidth || 1;
  const previousPlan = Math.round(plansEl.scrollLeft / previousWidth);

  plansEl.innerHTML = state.plans.map((plan,pi) => `
    <article class="plan">
      <input class="plan-title" data-action="planTitle" data-plan="${pi}" value="${esc(plan.title)}">

      <div class="plan-total">
        <span>プラン合計</span>
        <strong>${yen(planTotal(plan))}</strong>
      </div>

      ${plan.units.map((unit,ui) => `
        <section class="unit">
          <input class="unit-title" data-action="unitTitle" data-plan="${pi}" data-unit="${ui}" value="${esc(unit.title)}">

          <div class="quick edit-only">
            <div class="label">① 新規／買替え</div>
            <div class="choice-row">
              <button class="choice-btn ${unit.type === "replacement" ? "selected" : ""}"
                data-action="type" data-plan="${pi}" data-unit="${ui}" data-type="replacement">買替え</button>
              <button class="choice-btn ${unit.type === "new" ? "selected" : ""}"
                data-action="type" data-plan="${pi}" data-unit="${ui}" data-type="new">新規</button>
            </div>

            <div class="label">② 容量</div>
            <div class="capacity-row">
              ${CAPACITIES.map(cap => `
                <button class="capacity-btn ${unit.capacity === cap ? "selected" : ""}"
                  data-action="capacity" data-plan="${pi}" data-unit="${ui}" data-capacity="${cap}">
                  ${cap}
                </button>
              `).join("")}
            </div>

            <div class="label">③ 本体価格</div>
            <div class="price-row">
              <span>${unit.capacity ? TATAMI[unit.capacity] : "容量未選択"}</span>
              <input type="number" inputmode="numeric"
                data-action="quickPrice" data-plan="${pi}" data-unit="${ui}"
                value="${esc(row(unit,"本体").amount)}" placeholder="0">
            </div>
          </div>

          <div class="summary-chip">
            ${unit.type === "replacement" ? "買替え" : "新規"} ／
            ${unit.capacity ? TATAMI[unit.capacity] : "畳数未選択"}
          </div>

          <div class="header-row">
            <span class="edit-only">使用</span>
            <span>項目</span>
            <span>金額</span>
            <span class="edit-only"></span>
          </div>

          ${unit.rows.map((r,ri) => `
            <div class="item-row ${r.enabled === false ? "disabled-row" : ""}">
              <button class="toggle edit-only ${r.enabled === false ? "off" : ""}"
                data-action="toggle" data-plan="${pi}" data-unit="${ui}" data-row="${ri}">
                ${r.enabled === false ? "使わない" : "使う"}
              </button>

              <input type="text"
                data-action="name" data-plan="${pi}" data-unit="${ui}" data-row="${ri}"
                value="${esc(r.name)}" placeholder="項目名">

              <input type="number" inputmode="numeric"
                data-action="amount" data-plan="${pi}" data-unit="${ui}" data-row="${ri}"
                value="${esc(r.amount)}" placeholder="0">

              <button class="remove edit-only"
                data-action="removeRow" data-plan="${pi}" data-unit="${ui}" data-row="${ri}">×</button>
            </div>
          `).join("")}

          <div class="unit-actions edit-only">
            <button data-action="addRow" data-plan="${pi}" data-unit="${ui}">＋ 項目追加</button>
            <button data-action="copyUnit" data-plan="${pi}" data-unit="${ui}">次の台へコピー</button>
            ${plan.units.length > 1
              ? `<button class="danger" data-action="deleteUnit" data-plan="${pi}" data-unit="${ui}">この台を削除</button>`
              : ""}
          </div>

          <div class="subtotal">
            <span>${esc(unit.title)} 小計</span>
            <strong>${yen(unitTotal(unit))}</strong>
          </div>
        </section>
      `).join("")}

      <button class="add-unit edit-only" data-action="addUnit" data-plan="${pi}">
        ＋ もう1台増やす
      </button>

      <div class="plan-total" style="margin-top:10px;margin-bottom:0">
        <span>プラン合計</span>
        <strong>${yen(planTotal(plan))}</strong>
      </div>
    </article>
  `).join("");

  requestAnimationFrame(() => {
    const isPortraitSwipe = window.matchMedia("(max-width:980px) and (orientation:portrait)").matches;
    if(isPortraitSwipe){
      plansEl.scrollLeft = previousPlan * plansEl.clientWidth;
    }
  });
}

function handleInput(el){
  const pi = Number(el.dataset.plan);
  const action = el.dataset.action;
  const plan = state.plans[pi];

  if(action === "planTitle"){
    plan.title = el.value;
  }else{
    const ui = Number(el.dataset.unit);
    const unit = plan.units[ui];

    if(action === "unitTitle"){
      unit.title = el.value;
    }else if(action === "quickPrice"){
      row(unit,"本体").amount = el.value;
    }else{
      const ri = Number(el.dataset.row);
      unit.rows[ri][action] = el.value;
    }
  }
  saveAuto();
  render();
}
function addUnit(pi){
  const plan = state.plans[pi];
  if(plan.units.length >= MAX_UNITS){
    showStatus("最大10台まで追加できます。");
    return;
  }
  plan.units.push(blankUnit(plan.units.length + 1));
  saveAuto();
  render();
  showStatus(`${plan.units.length}台目を追加しました。`);
}
function deleteUnit(pi,ui){
  const plan = state.plans[pi];
  if(plan.units.length <= 1) return;
  plan.units.splice(ui,1);
  plan.units.forEach((u,index) => u.title = `${index + 1}台目`);
  saveAuto();
  render();
}
function copyUnit(pi,ui){
  const plan = state.plans[pi];
  let target = ui + 1;

  if(target >= plan.units.length){
    if(plan.units.length >= MAX_UNITS){
      showStatus("これ以上追加できません。");
      return;
    }
    plan.units.push(blankUnit(plan.units.length + 1));
  }

  const targetTitle = plan.units[target].title;
  plan.units[target] = JSON.parse(JSON.stringify(plan.units[ui]));
  plan.units[target].title = targetTitle;

  saveAuto();
  render();
  showStatus(`${ui + 1}台目を${target + 1}台目へコピーしました。`);
}

document.getElementById("plans").addEventListener("input",e => {
  if(e.target.matches("input[data-action]")) handleInput(e.target);
});
document.getElementById("plans").addEventListener("click",e => {
  const btn = e.target.closest("button[data-action]");
  if(!btn) return;

  const pi = Number(btn.dataset.plan);
  const ui = Number(btn.dataset.unit);
  const ri = Number(btn.dataset.row);
  const unit = state.plans[pi]?.units[ui];

  switch(btn.dataset.action){
    case "type":
      applyType(unit,btn.dataset.type);
      saveAuto();
      render();
      showStatus(btn.dataset.type === "replacement"
        ? "買替え：取り外し・リサイクルを有効にしました。"
        : "新規：取り外し・リサイクルを使わない設定にしました。");
      break;

    case "capacity":
      applyCapacity(unit,btn.dataset.capacity);
      saveAuto();
      render();
      showStatus(`${btn.dataset.capacity}kWを選択し、工事費を自動入力しました。`);
      break;

    case "toggle":
      unit.rows[ri].enabled = unit.rows[ri].enabled === false;
      saveAuto();
      render();
      break;

    case "removeRow":
      unit.rows.splice(ri,1);
      saveAuto();
      render();
      break;

    case "addRow":
      unit.rows.push({name:"",amount:"",enabled:true});
      saveAuto();
      render();
      break;

    case "addUnit":
      addUnit(pi);
      break;

    case "deleteUnit":
      if(confirm("この1台分を削除しますか？")) deleteUnit(pi,ui);
      break;

    case "copyUnit":
      copyUnit(pi,ui);
      break;
  }
});

function renderSaved(){
  const store = getStore();
  const wrap = document.getElementById("savedList");

  if(!store.saves.length){
    wrap.innerHTML = '<div style="color:var(--muted);font-size:13px">まだ保存されていません。</div>';
    return;
  }

  wrap.innerHTML = store.saves.map(item => `
    <div class="saved-entry">
      <span>
        <strong>${esc(item.name)}</strong><br>
        <small>${esc(new Date(item.savedAt).toLocaleString("ja-JP"))}</small>
      </span>
      <button data-load="${item.id}">開く</button>
      <button data-delete="${item.id}" style="color:var(--danger)">削除</button>
    </div>
  `).join("");
}

document.getElementById("saveBtn").addEventListener("click",() => {
  const input = document.getElementById("saveName");
  const name = input.value.trim() || new Date().toLocaleString("ja-JP");
  const store = getStore();

  store.saves.unshift({
    id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
    name,
    savedAt: new Date().toISOString(),
    state: JSON.parse(JSON.stringify(state))
  });
  store.saves = store.saves.slice(0,30);
  setStore(store);

  input.value = "";
  renderSaved();
  showStatus(`「${name}」を保存しました。`);
});

document.getElementById("savedList").addEventListener("click",e => {
  const load = e.target.closest("[data-load]");
  const del = e.target.closest("[data-delete]");
  const store = getStore();

  if(load){
    const item = store.saves.find(x => x.id === load.dataset.load);
    if(item){
      state = JSON.parse(JSON.stringify(item.state));
      saveAuto();
      render();
      showStatus(`「${item.name}」を読み込みました。`);
    }
  }

  if(del && confirm("この保存データを削除しますか？")){
    store.saves = store.saves.filter(x => x.id !== del.dataset.delete);
    setStore(store);
    renderSaved();
  }
});

document.getElementById("presentationBtn").addEventListener("click",() => {
  document.body.classList.toggle("presentation");
  document.getElementById("presentationBtn").textContent =
    document.body.classList.contains("presentation") ? "編集画面に戻る" : "プレゼン表示";
});
document.getElementById("printBtn").addEventListener("click",() => window.print());
document.getElementById("resetBtn").addEventListener("click",() => {
  if(!confirm("すべての入力内容を初期状態に戻しますか？")) return;
  state = {
    plans:[blankPlan("プランA"),blankPlan("プランB"),blankPlan("プランC")]
  };
  saveAuto();
  render();
});

const stored = getStore();
if(stored.autosave?.plans?.length === 3){
  state = stored.autosave;
}

render();
renderSaved();
</script>
</body>
</html>
