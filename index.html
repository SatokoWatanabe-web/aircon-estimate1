<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f4f5f7">
  <title><font color=white>3台口・3プラン見積もり比較</font></title>
  <style>
    :root{
      --bg:#0f2747;--card:#ffffff;--line:#d8dbe2;--text:#0f172a;
      --muted:#667085;--accent:#2563eb;--danger:#b42318;
      --soft:#f4f8fc;--shadow:0 8px 24px rgba(16,24,40,.08)
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
    button,input{font:inherit}
    .app{min-height:100vh;padding:12px}
    .topbar{display:flex;gap:8px;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap}
    h1{font-size:20px;margin:0}
    .sub{margin:2px 0 0;color:var(--muted);font-size:12px}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    button{border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px 12px;cursor:pointer;font-weight:700}
    button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
    button.danger{color:var(--danger)}
    .saved-name{width:min(260px,100%);border:1px solid var(--line);border-radius:10px;padding:9px 10px;background:#fff}

    .board{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:8px;
      overflow-x:hidden;
      padding-bottom:10px;
    }
    .plan{
      background:var(--card);border:1px solid var(--line);border-radius:14px;
      box-shadow:var(--shadow);padding:10px;min-width:0
    }
    .plan-title{
      width:100%;font-size:18px;font-weight:800;border:1px solid var(--line);
      border-radius:10px;padding:10px;margin-bottom:8px;text-align:center
    }
    .grand-total{color:#fff;
      display:flex;justify-content:space-between;align-items:baseline;gap:8px;
      background:#163b69;border:1px solid #2f5f99;border-radius:10px;padding:10px;
      margin-bottom:10px;font-weight:900
    }
    .grand-total.bottom{margin:10px 0 0}
    .grand-total .amount{font-size:25px}

    .unit{
      border:1px solid var(--line);border-radius:12px;padding:8px;
      margin-bottom:10px;background:var(--soft)
    }
    .unit:last-of-type{margin-bottom:0}
    .unit-title{
      width:100%;font-size:15px;font-weight:800;border:1px solid var(--line);
      border-radius:9px;padding:8px;margin-bottom:7px;background:#fff
    }
    .header-row,.item-row{
      display:grid;
      grid-template-columns:54px minmax(92px,1.45fr) minmax(76px,.9fr) 36px;
      gap:4px;align-items:center
    }
    .header-row{color:var(--muted);font-size:11px;font-weight:700;padding:0 2px 4px}
    .item-row{margin-bottom:5px}
    .item-row input{
      width:100%;border:1px solid var(--line);border-radius:8px;
      padding:8px 6px;min-width:0;font-size:13px;background:#fff
    }
    .item-row input[type="number"]{text-align:right}
    .use-toggle{height:36px;padding:0 5px;font-size:10px;white-space:nowrap}
    .use-toggle.off{color:var(--muted);background:#eef0f3}
    .item-row.disabled-row input{opacity:.48;background:#eef0f3}
    .remove{width:36px;height:36px;padding:0;color:var(--danger);background:#fff}
    .unit-subtotal{
      display:flex;justify-content:space-between;align-items:center;
      border-top:1px solid var(--line);padding-top:7px;margin-top:5px;
      font-weight:800;font-size:13px
    }
    .unit-subtotal .amount{font-size:17px}
    .unit-controls{display:flex;gap:6px;margin-top:6px}
    .unit-controls button{flex:1;padding:7px 6px;font-size:12px}

    .status{min-height:22px;margin-top:6px;font-size:13px;color:var(--muted)}
    .saved-list{margin-top:12px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px}
    .saved-list h2{font-size:15px;margin:0 0 8px}
    .saved-entry{display:flex;gap:8px;align-items:center;padding:7px 0;border-top:1px solid #eceef2}
    .saved-entry:first-of-type{border-top:none}
    .saved-entry span{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .saved-entry button{padding:7px 9px}

    body.presentation .edit-only,
    body.presentation .remove,
    body.presentation .unit-controls,
    body.presentation .saved-list,
    body.presentation .topbar .sub{display:none!important}
    body.presentation .item-row.disabled-row{display:none!important}
    body.presentation .app{padding:6px;background:#fff}
    body.presentation .board{gap:6px;overflow:visible}
    body.presentation .plan{box-shadow:none;border-radius:8px;padding:7px;min-width:0}
    body.presentation input{border-color:transparent;background:transparent;padding-left:2px;padding-right:2px}
    body.presentation .plan-title{font-size:18px}
    body.presentation .header-row,body.presentation .item-row{
      grid-template-columns:minmax(105px,1.5fr) minmax(78px,.9fr)
    }

    @media (orientation:portrait){
      .board{
        display:flex;overflow-x:auto;scroll-snap-type:x mandatory;
        gap:10px;padding-bottom:12px
      }
      .plan{flex:0 0 100%;min-width:100%;scroll-snap-align:start}
    }
    @media (orientation:landscape){
      .board{grid-template-columns:repeat(3,minmax(0,1fr));overflow-x:hidden}
      .plan{min-width:0}
      .plan-title{font-size:16px;padding:8px}
      .grand-total .amount{font-size:21px}
      .unit{padding:6px}
      .unit-title{font-size:14px;padding:7px}
      .header-row,.item-row{
        grid-template-columns:46px minmax(78px,1.4fr) minmax(66px,.9fr) 32px;
        gap:3px
      }
      .item-row input{padding:7px 5px;font-size:12px}
      .use-toggle{height:32px;font-size:9px}
      .remove{width:32px;height:32px}
      .unit-subtotal .amount{font-size:15px}
      button{padding:7px 8px}
    }
    @media print{
      .topbar,.saved-list,.status,.unit-controls,.remove,.use-toggle{display:none!important}
      .item-row.disabled-row{display:none!important}
      body{background:#fff}.app{padding:0}.board{overflow:visible;gap:6px}
      .plan{box-shadow:none;break-inside:avoid}
      .header-row,.item-row{grid-template-columns:minmax(105px,1.5fr) minmax(78px,.9fr)}
    }
  </style>
</head>
<body>
<main class="app">
  <section class="topbar">
    <div>
      <h1>3台口・3プラン見積もり比較</h1>
      <p class="sub">縦画面は1プランずつ、横画面はA・B・Cを3列表示します。</p>
    </div>
    <div class="actions edit-only">
      <input id="saveName" class="saved-name" placeholder="保存名（例：田中様 3台口）">
      <button id="saveBtn" class="primary">保存</button>
      <button id="presentationBtn">プレゼン表示</button>
      <button id="printBtn">印刷 / PDF</button>
      <button id="clearBtn" class="danger">全消去</button>
    </div>
  </section>

  <section id="board" class="board"></section>
  <div id="status" class="status" aria-live="polite"></div>

  <section class="saved-list edit-only">
    <h2>保存した見積もり</h2>
    <div id="savedItems"></div>
  </section>
</main>

<script>
const MAX_ROWS=15;
const STORAGE_KEY="estimateCompareApp.3units.v1";
const initialItems=["本体","工事費用","保証","取り外し費用","リサイクル","値引","複数台値引"];

function createUnit(index){
  return {
    title:`${index}台目`,
    rows:initialItems.map(name=>({name,amount:"",enabled:true}))
  };
}
function createPlan(title){
  return {title,units:[createUnit(1),createUnit(2),createUnit(3)]};
}
const state={plans:[createPlan("プランA"),createPlan("プランB"),createPlan("プランC")]};

function yen(v){return new Intl.NumberFormat("ja-JP").format(Number(v)||0)+"円"}
function esc(s){
  return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;")
  .replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
}
function unitTotal(unit){
  return unit.rows.reduce((sum,row)=>sum+(row.enabled===false?0:(Number(row.amount)||0)),0);
}
function planTotal(plan){return plan.units.reduce((sum,u)=>sum+unitTotal(u),0)}

function render(){
  document.getElementById("board").innerHTML=state.plans.map((plan,pi)=>`
    <article class="plan">
      <input class="plan-title" value="${esc(plan.title)}" data-action="planTitle" data-plan="${pi}" aria-label="プラン名">

      <div class="grand-total">
        <span>プラン合計</span><span class="amount plan-total">${yen(planTotal(plan))}</span>
      </div>

      ${plan.units.map((unit,ui)=>`
        <section class="unit">
          <input class="unit-title" value="${esc(unit.title)}" data-action="unitTitle" data-plan="${pi}" data-unit="${ui}" aria-label="台数名">
          <div class="header-row">
            <span class="edit-only">使用</span><span>項目</span><span>金額</span><span class="edit-only"></span>
          </div>
          ${unit.rows.map((row,ri)=>`
            <div class="item-row ${row.enabled===false?"disabled-row":""}">
              <button class="use-toggle edit-only ${row.enabled===false?"off":""}"
                data-action="toggle" data-plan="${pi}" data-unit="${ui}" data-row="${ri}">
                ${row.enabled===false?"使わない":"使う"}
              </button>
              <input type="text" value="${esc(row.name)}" data-action="name"
                data-plan="${pi}" data-unit="${ui}" data-row="${ri}" placeholder="項目名">
              <input type="number" inputmode="numeric" step="1" value="${esc(row.amount)}"
                data-action="amount" data-plan="${pi}" data-unit="${ui}" data-row="${ri}" placeholder="0">
              <button class="remove edit-only" data-action="remove"
                data-plan="${pi}" data-unit="${ui}" data-row="${ri}" aria-label="この行を削除">×</button>
            </div>`).join("")}
          <div class="unit-controls edit-only">
            <button data-action="add" data-plan="${pi}" data-unit="${ui}" ${unit.rows.length>=MAX_ROWS?"disabled":""}>＋ 行を追加</button>
            <button data-action="copyUnit" data-plan="${pi}" data-unit="${ui}">次の台へコピー</button>
          </div>
          <div class="unit-subtotal">
            <span>${esc(unit.title)} 小計</span><span class="amount">${yen(unitTotal(unit))}</span>
          </div>
        </section>`).join("")}

      <div class="grand-total bottom">
        <span>プラン合計</span><span class="amount plan-total">${yen(planTotal(plan))}</span>
      </div>
    </article>`).join("");
}

function updateInput(input){
  const pi=Number(input.dataset.plan),a=input.dataset.action;
  if(a==="planTitle") state.plans[pi].title=input.value;
  else{
    const ui=Number(input.dataset.unit);
    if(a==="unitTitle") state.plans[pi].units[ui].title=input.value;
    else state.plans[pi].units[ui].rows[Number(input.dataset.row)][a]=input.value;
  }
  autosave();renderTotalsOnly();
}
function renderTotalsOnly(){
  document.querySelectorAll(".plan").forEach((planEl,pi)=>{
    const plan=state.plans[pi];
    planEl.querySelectorAll(".unit-subtotal .amount").forEach((el,ui)=>el.textContent=yen(unitTotal(plan.units[ui])));
    planEl.querySelectorAll(".plan-total").forEach(el=>el.textContent=yen(planTotal(plan)));
  });
}
function addRow(pi,ui){
  const rows=state.plans[pi].units[ui].rows;
  if(rows.length>=MAX_ROWS){showStatus("1台につき15行までです。");return}
  rows.push({name:"",amount:"",enabled:true});autosave();render();
}
function removeRow(pi,ui,ri){
  const rows=state.plans[pi].units[ui].rows;
  rows.splice(ri,1);
  if(!rows.length)rows.push({name:"",amount:"",enabled:true});
  autosave();render();
}
function toggleRow(pi,ui,ri){
  const row=state.plans[pi].units[ui].rows[ri];
  row.enabled=row.enabled===false?true:false;autosave();render();
}
function copyUnit(pi,ui){
  const target=ui+1;
  if(target>=3){showStatus("3台目なので次の台はありません。");return}
  const title=state.plans[pi].units[target].title;
  state.plans[pi].units[target]=JSON.parse(JSON.stringify(state.plans[pi].units[ui]));
  state.plans[pi].units[target].title=title;
  autosave();render();showStatus(`${ui+1}台目を${target+1}台目へコピーしました。`);
}
function getStore(){
  try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{autosave:null,saves:[]}}
  catch{return{autosave:null,saves:[]}}
}
function setStore(d){localStorage.setItem(STORAGE_KEY,JSON.stringify(d))}
function autosave(){const d=getStore();d.autosave=JSON.parse(JSON.stringify(state));setStore(d)}
function restore(){
  const d=getStore();
  if(d.autosave?.plans?.length===3)state.plans=d.autosave.plans;
}
function saveNamed(){
  const input=document.getElementById("saveName"),name=input.value.trim()||new Date().toLocaleString("ja-JP");
  const d=getStore();
  d.saves.unshift({id:(crypto.randomUUID?crypto.randomUUID():String(Date.now())),name,savedAt:new Date().toISOString(),state:JSON.parse(JSON.stringify(state))});
  d.saves=d.saves.slice(0,30);setStore(d);input.value="";renderSaved();showStatus(`「${name}」を保存しました。`);
}
function loadNamed(id){
  const found=getStore().saves.find(x=>x.id===id);if(!found)return;
  state.plans=JSON.parse(JSON.stringify(found.state.plans));autosave();render();showStatus(`「${found.name}」を読み込みました。`);
}
function deleteNamed(id){
  const d=getStore();d.saves=d.saves.filter(x=>x.id!==id);setStore(d);renderSaved();showStatus("保存データを削除しました。");
}
function renderSaved(){
  const c=document.getElementById("savedItems"),d=getStore();
  if(!d.saves.length){c.innerHTML='<div style="color:var(--muted);font-size:13px">まだ保存されていません。</div>';return}
  c.innerHTML=d.saves.map(x=>`<div class="saved-entry">
    <span><strong>${esc(x.name)}</strong><br><small>${esc(new Date(x.savedAt).toLocaleString("ja-JP"))}</small></span>
    <button data-load-id="${x.id}">開く</button>
    <button class="danger" data-delete-id="${x.id}">削除</button>
  </div>`).join("");
}
function clearAll(){
  if(!confirm("入力内容をすべて消しますか？"))return;
  state.plans=[createPlan("プランA"),createPlan("プランB"),createPlan("プランC")];
  autosave();render();showStatus("入力内容を消去しました。");
}
function togglePresentation(){
  document.body.classList.toggle("presentation");
  document.getElementById("presentationBtn").textContent=
    document.body.classList.contains("presentation")?"編集画面に戻る":"プレゼン表示";
}
function showStatus(m){
  const e=document.getElementById("status");e.textContent=m;
  clearTimeout(showStatus.t);showStatus.t=setTimeout(()=>e.textContent="",3000);
}

document.getElementById("board").addEventListener("input",e=>{
  if(e.target.matches("input[data-action]"))updateInput(e.target);
});
document.getElementById("board").addEventListener("click",e=>{
  const b=e.target.closest("button[data-action]");if(!b)return;
  const pi=Number(b.dataset.plan),ui=Number(b.dataset.unit),ri=Number(b.dataset.row),a=b.dataset.action;
  if(a==="add")addRow(pi,ui);
  if(a==="remove")removeRow(pi,ui,ri);
  if(a==="toggle")toggleRow(pi,ui,ri);
  if(a==="copyUnit")copyUnit(pi,ui);
});
document.getElementById("saveBtn").addEventListener("click",saveNamed);
document.getElementById("presentationBtn").addEventListener("click",togglePresentation);
document.getElementById("printBtn").addEventListener("click",()=>window.print());
document.getElementById("clearBtn").addEventListener("click",clearAll);
document.getElementById("savedItems").addEventListener("click",e=>{
  const l=e.target.closest("[data-load-id]"),d=e.target.closest("[data-delete-id]");
  if(l)loadNamed(l.dataset.loadId);
  if(d&&confirm("この保存データを削除しますか？"))deleteNamed(d.dataset.deleteId);
});

restore();render();renderSaved();
</script>
</body>
</html>
